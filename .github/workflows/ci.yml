name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  app-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Проверяем, что Docker вообще работает
      - name: Show Docker version
        run: docker --version

      # 3. Билдим backend (самое важное)
      - name: Build backend image
        run: docker build ./backend

      # 4. Поднимаем всё через docker-compose
      - name: Start services
        run: docker compose up -d

      # 5. Ждем пока сервисы поднимутся
      - name: Wait for services
        run: sleep 5

      # 6. Проверяем, что контейнеры реально запущены
      - name: Check running containers
        run: docker ps

      # 7. Проверяем backend (ВАЖНО: поправь порт!)
      - name: Check backend health
        run: curl -f http://localhost:8000/health

      # 8. Если что-то сломалось — покажем логи
      - name: Show logs if failed
        if: failure()
        run: docker compose logs