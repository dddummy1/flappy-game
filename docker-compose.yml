services:
  db:
    image: postgres:16-alpine
    container_name: flappy-devops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flappy_devops
      POSTGRES_USER: flappy
      POSTGRES_PASSWORD: flappy_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flappy-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flappy -d flappy_devops"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: flappy-devops-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://flappy:flappy_password@db:5432/flappy_devops
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flappy-net

  nginx:
    image: nginx:1.27-alpine
    container_name: flappy-devops-nginx
    restart: "no"
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - flappy-net

volumes:
  postgres_data:

networks:
  flappy-net:
    name: flappy-net
    driver: bridge